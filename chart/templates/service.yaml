apiVersion: v1
kind: Service
metadata:
  name: {{ include "tempura.fullname" . }}
  labels:
    {{- include "tempura.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: proxy
      protocol: TCP
      name: proxy
    - port: {{ .Values.service.adminPort }}
      targetPort: admin
      protocol: TCP
      name: admin
  selector:
    {{- include "tempura.selectorLabels" . | nindent 4 }}
